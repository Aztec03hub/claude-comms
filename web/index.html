<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Comms</title>
  <!-- Wave-stack favicon: bundled SVG sourced from public/favicon.svg.
       Vite emits it to the wheel-shipped dist/ root, so the daemon's
       static-file mount serves it from / (no 404). -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- Inter is bundled via @fontsource-variable/inter (see web/src/app.css)
       so the daemon's CSP can stay strict (no external Google Fonts CDN
       required) and the UI renders the intended typeface offline. -->
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
