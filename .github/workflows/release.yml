name: Release to PyPI

# Tag-driven publish: pushing a tag like `v0.2.0` triggers a wheel+sdist
# build and publishes both to PyPI via OIDC trusted publishing. No long-lived
# API tokens are stored in repo secrets; the trust relationship is configured
# once on PyPI (Account -> Publishing -> Add trusted publisher).
#
# Security note: this workflow does NOT consume any untrusted github.event.*
# inputs (issue/PR/commit-message bodies, etc.). All shell expansions are
# from fixed strings or `ls`/`python -m zipfile` output we control.
on:
  push:
    tags: ["v*"]

permissions:
  id-token: write   # required for PyPI trusted publishing (OIDC)
  contents: read

# Opt all JS-based actions into Node 24 ahead of GitHub's 2026-06-02 default
# flip / 2026-09-16 Node-20 removal. Inherited by every job; harmless once
# Node 24 becomes the default (the variable becomes a no-op).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-publish:
    name: Build wheel + publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/claude-comms/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: "11"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify wheel ships web UI
        run: |
          set -euo pipefail
          wheel=$(ls dist/*.whl)
          python -m zipfile -l "$wheel" | grep -q 'claude_comms/web/dist/index.html' \
            || { echo "FAIL: $wheel missing web UI"; exit 1; }
          echo "OK: web/dist/index.html present in $wheel"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
